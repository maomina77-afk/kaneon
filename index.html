<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>釣り鐘サウンドカウンター</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: system-ui, sans-serif;
    text-align: center;
    padding: 20px;
    background: #f5f5f5;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 0.5rem;
  }
  #count {
    font-size: 3rem;
    margin: 1rem 0;
  }
  button {
    font-size: 1.1rem;
    padding: 0.6rem 1.4rem;
    margin: 0.4rem;
    border-radius: 6px;
    border: none;
    color: #fff;
  }
  #startBtn { background: #007bff; }
  #stopBtn  { background: #6c757d; }
  #resetBtn { background: #dc3545; }
  #status {
    margin-top: 1rem;
    font-size: 0.9rem;
    color: #555;
  }
</style>
</head>
<body>
<h1>釣り鐘サウンドカウンター</h1>
<div>カウント</div>
<div id="count">0</div>

<button id="startBtn">開始</button>
<button id="stopBtn" disabled>停止</button>
<button id="resetBtn">リセット</button>

<div id="status">待機中</div>

<script>
  let audioContext = null;
  let analyser = null;
  let dataArray = null;
  let mediaStream = null;
  let running = false;
  let count = 0;

  // 釣り鐘判定用パラメータ（必要に応じて調整）
  const MIN_VOLUME = 0.25;        // 音量しきい値（0〜1くらいの感覚）
  const BELL_MIN_FREQ = 400;      // 釣り鐘の主成分がありそうな下限周波数(Hz)
  const BELL_MAX_FREQ = 1200;     // 上限周波数(Hz)
  const COOLDOWN_MS = 3000;       // 1回カウントしたあとのクールタイム
  let lastHitTime = 0;

  const countEl = document.getElementById('count');
  const statusEl = document.getElementById('status');
  const startBtn = document.getElementById('startBtn');
  const stopBtn  = document.getElementById('stopBtn');
  const resetBtn = document.getElementById('resetBtn');

  startBtn.addEventListener('click', start);
  stopBtn.addEventListener('click', stop);
  resetBtn.addEventListener('click', () => {
    count = 0;
    countEl.textContent = count;
  });

  async function start() {
    if (running) return;
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      alert('マイクへのアクセスが許可されませんでした。設定を確認してください。');
      return;
    }

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(mediaStream);

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);

    source.connect(analyser);

    running = true;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusEl.textContent = '計測中… 釣り鐘を鳴らしてテストしてください。';

    analyzeLoop();
  }

  function stop() {
    running = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusEl.textContent = '停止中';

    if (mediaStream) {
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }
    if (audioContext) {
      audioContext.close();
      audioContext = null;
    }
  }

  function analyzeLoop() {
    if (!running || !analyser) return;

    analyser.getByteFrequencyData(dataArray);

    const sampleRate = audioContext.sampleRate;
    const binSize = sampleRate / analyser.fftSize;

    // 釣り鐘の周波数帯だけを見る
    let maxInBand = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const freq = i * binSize;
      if (freq >= BELL_MIN_FREQ && freq <= BELL_MAX_FREQ) {
        if (dataArray[i] > maxInBand) {
          maxInBand = dataArray[i];
        }
      }
    }

    // 0〜255 を 0〜1 に正規化
    const volumeInBand = maxInBand / 255;

    const now = performance.now();
    if (volumeInBand > MIN_VOLUME && (now - lastHitTime) > COOLDOWN_MS) {
      // 釣り鐘が鳴ったと判定
      count++;
      countEl.textContent = count;
      lastHitTime = now;
      statusEl.textContent = '釣り鐘を検出しました！';
    }

    requestAnimationFrame(analyzeLoop);
  }
</script>
</body>
</html>
