<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>釣り鐘 周波数＋音量 ログ記録（しきい値付き）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: system-ui, sans-serif;
    text-align: center;
    padding: 10px;
    background: #f5f5f5;
  }
  h1 { font-size: 1.3rem; }
  #peakFreq, #volume {
    font-size: 1.8rem;
    margin: 10px 0;
    color: #007bff;
  }
  canvas {
    width: 100%;
    height: 200px;
    background: #fff;
    border: 1px solid #ccc;
    margin-top: 10px;
  }
  button {
    font-size: 1.1rem;
    padding: 0.6rem 1.4rem;
    margin: 0.4rem;
    border-radius: 6px;
    border: none;
    color: #fff;
  }
  #startBtn { background: #007bff; }
  #stopBtn  { background: #6c757d; }
  #downloadBtn { background: #28a745; }
  #logArea {
    margin-top: 15px;
    text-align: left;
    background: #fff;
    padding: 10px;
    height: 200px;
    overflow-y: scroll;
    border: 1px solid #ccc;
    font-size: 0.9rem;
  }
  #thresholdBox {
    margin: 10px 0;
    font-size: 1rem;
  }
</style>
</head>
<body>

<h1>釣り鐘 周波数＋音量 ログ記録（しきい値付き）</h1>

<div id="thresholdBox">
  音量しきい値（0〜1）：
  <input type="number" id="threshold" value="0.20" step="0.01" min="0" max="1">
</div>

<div>ピーク周波数</div>
<div id="peakFreq">-- Hz</div>

<div>音量（0〜1）</div>
<div id="volume">--</div>

<button id="startBtn">開始</button>
<button id="stopBtn" disabled>停止</button>
<button id="downloadBtn" disabled>CSVダウンロード</button>

<canvas id="canvas"></canvas>

<h3>ログ（しきい値以上のみ記録）</h3>
<div id="logArea"></div>

<script>
let audioContext, analyser, timeAnalyser, freqData, timeData, mediaStream;
let running = false;
let logData = [];
let lastLogTime = 0;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const peakFreqEl = document.getElementById("peakFreq");
const volumeEl = document.getElementById("volume");
const logArea = document.getElementById("logArea");
const thresholdInput = document.getElementById("threshold");

document.getElementById("startBtn").onclick = start;
document.getElementById("stopBtn").onclick = stop;
document.getElementById("downloadBtn").onclick = downloadCSV;

async function start() {
  if (running) return;

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    alert("マイクアクセスが拒否されました。設定を確認してください。");
    return;
  }

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioContext.createMediaStreamSource(mediaStream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  freqData = new Uint8Array(analyser.frequencyBinCount);

  timeAnalyser = audioContext.createAnalyser();
  timeAnalyser.fftSize = 2048;
  timeData = new Uint8Array(timeAnalyser.fftSize);

  source.connect(analyser);
  source.connect(timeAnalyser);

  running = true;
  document.getElementById("startBtn").disabled = true;
  document.getElementById("stopBtn").disabled = false;
  document.getElementById("downloadBtn").disabled = false;

  draw();
}

function stop() {
  running = false;
  document.getElementById("startBtn").disabled = false;
  document.getElementById("stopBtn").disabled = true;

  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
  }
  if (audioContext) audioContext.close();
}

function draw() {
  if (!running) return;

  requestAnimationFrame(draw);

  analyser.getByteFrequencyData(freqData);
  timeAnalyser.getByteTimeDomainData(timeData);

  const width = canvas.width;
  const height = canvas.height;
  ctx.clearRect(0, 0, width, height);

  const barWidth = width / freqData.length;

  let maxVal = 0;
  let maxIndex = 0;

  for (let i = 0; i < freqData.length; i++) {
    const value = freqData[i];
    if (value > maxVal) {
      maxVal = value;
      maxIndex = i;
    }

    const barHeight = (value / 255) * height;
    ctx.fillStyle = "#007bff";
    ctx.fillRect(i * barWidth, height - barHeight, barWidth, barHeight);
  }

  const sampleRate = audioContext.sampleRate;
  const freq = Math.round(maxIndex * (sampleRate / analyser.fftSize));
  peakFreqEl.textContent = freq + " Hz";

  let sum = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    sum += v * v;
  }
  const rms = Math.sqrt(sum / timeData.length);
  const volume = rms.toFixed(3);
  volumeEl.textContent = volume;

  const threshold = parseFloat(thresholdInput.value);

  const now = Date.now();
  if (now - lastLogTime >= 1000) {
    if (rms >= threshold) {
      const timeStr = new Date().toLocaleTimeString();
      const line = `${timeStr}, ${freq}, ${volume}`;
      logData.push(line);
      logArea.innerHTML += line + "<br>";
      logArea.scrollTop = logArea.scrollHeight;
    }
    lastLogTime = now;
  }
}

function downloadCSV() {
  let csv = "time,frequency,volume\n";
  csv += logData.join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "bell_log_threshold.csv";
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
